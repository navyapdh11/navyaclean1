services:
  - type: web
    name: cleanpro-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cleanpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        value: https://cleaning-services-enterprise-2026.vercel.app
      - key: LOG_LEVEL
        value: info

  - type: web
    name: cleanpro-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: cleanpro-backend
          type: web
          property: host
          envVarKey: NEXT_PUBLIC_API_URL

databases:
  - name: cleanpro-db
    databaseName: cleaning_services
